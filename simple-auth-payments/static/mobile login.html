<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Floxly Login</title>
    <link rel="stylesheet" href="deliverect-pattern-background.png">
</head>

<style>
    * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
}

body {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    /* Smoother, more premium gradient */
    background: linear-gradient(180deg, #3b82f6 0%, #dbeafe 100%);
    color: #ffffff;
}

/* Subtle glass card to fix visual hierarchy */
.login-container {
    width: 100%;
    max-width: 400px;
    padding: 45px 32px;
    text-align: center;
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(12px);
    border-radius: 24px;
    box-shadow: 0 20px 40px rgba(15, 23, 42, 0.15);
}

/* Logo */
.logo-section {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 10px;
    margin-bottom: 42px; /* slightly tighter */
}

.logo-text {
    font-size: 28px;
    font-weight: 600;
    letter-spacing: 0.5px;
}

/* Header */
.header-text h1 {
    font-size: 30px;
    margin-bottom: 8px;
    letter-spacing: 0.5px;
}

.header-text p {
    font-size: 14px;
    opacity: 0.85;
    margin-bottom: 36px;
}

/* Separator */
.separator {
    position: relative;
    margin: 26px 0;
    text-align: center;
}

.separator::before {
    content: "";
    position: absolute;
    top: 50%;
    left: 0;
    width: 100%;
    height: 1px;
    background: rgba(255, 255, 255, 0.25); /* slightly stronger */
}

.separator span {
    position: relative;
    padding: 0 14px;
    font-size: 13px;
    color: rgba(255, 255, 255, 0.75);
}

/* Inputs — lighter than before to remove the “heavy blob” feeling */
.input-group {
    margin-bottom: 16px;
}

input {
    width: 100%;
    padding: 17px 22px;
    border-radius: 16px; /* modern but not exaggerated */
    border: 1px solid rgba(255,255,255,0.18);
    background-color: rgba(15, 23, 42, 0.55); /* softer than pure dark */
    color: #ffffff;
    font-size: 15px;
    outline: none;
    transition: all 0.2s ease;
}

input::placeholder {
    color: rgba(255,255,255,0.65); /* improved contrast */
}

input:focus {
    border-color: #7cf2f5;
    box-shadow: 0 0 0 3px rgba(124, 242, 245, 0.15);
    background-color: rgba(15, 23, 42, 0.7);
}

/* Forgot password */
.forgot-password {
    display: block;
    text-align: right;
    font-size: 13px;
    color: rgba(255,255,255,0.9);
    text-decoration: none;
    margin: 8px 6px 28px 0;
    transition: opacity 0.2s ease;
}

.forgot-password:hover {
    opacity: 1;
    text-decoration: underline;
}

/* CTA — stronger contrast so it clearly pops */
.login-btn {
    width: 100%;
    padding: 16px;
    border-radius: 18px;
    border: none;
    background: linear-gradient(90deg, #2563eb 0%, #06b6d4 100%);
    color: #ffffff; /* white text for stronger contrast */
    font-weight: 700;
    font-size: 16px;
    cursor: pointer;
    transition: all 0.2s ease;
    box-shadow: 0 12px 25px rgba(37, 99, 235, 0.35);
}

.login-btn:hover {
    transform: translateY(-1px) scale(1.01);
    box-shadow: 0 16px 32px rgba(37, 99, 235, 0.45);
}

/* Bottom links */
.signup-text {
    margin-top: 26px;
    font-size: 14px;
    color: rgba(255, 255, 255, 0.85);
}

.signup-text a {
    color: #ffffff;
    text-decoration: none;
    font-weight: 600;
}

.signup-text a:hover {
    text-decoration: underline;
}

.legal-links {
    margin-top: 60px; /* slightly reduced */
    font-size: 12px;
}

.legal-links a {
    color: rgb(0, 0, 0);
    text-decoration: underline;
    opacity: 0.7;
    margin: 0 5px;
}
</style>



<body>

 
    <div class="login-container">
        <div class="logo-section">
            <div class="logo-icon">
                <a href="index.html" style="display: flex; align-items: center; text-decoration: none; color: inherit;">
                    <img src="elements\white.png" alt="WASLA logo"
                         style="height: clamp(26px, 4.5vw, 42px); 
                                width: auto; 
                                max-width: 100%;
                                margin-top: 4px;">
                </a>
            </div>
            
        </div>

        <div class="header-text">
            <h1>Hi There!</h1>
            <p>Please enter required details.</p>
        </div>

        <div class="separator">
            <span>Or</span>
        </div>

        <form class="login-form">
            <div class="input-group">
                <input type="email" placeholder="Email address" required>
            </div>
            <div class="input-group">
                <input type="password" placeholder="Password" required>
            </div>
            
           

            <button type="submit" class="login-btn" style="margin-top: 15%;">Log In</button>
        </form>

        

        <div class="legal-links">
            <a href="#">Terms of Service</a> | <a href="#">Privacy Policy</a>
        </div>
    </div>
</body>
</html>
